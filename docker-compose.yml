services:
  postgres:
    image: postgres:16-alpine
    container_name: student-mental-health-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_mental_health_app}
      POSTGRES_USER: ${POSTGRES_USER:-student_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-student_app} -d ${POSTGRES_DB:-student_mental_health_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
