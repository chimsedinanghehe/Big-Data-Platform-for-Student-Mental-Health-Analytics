# =============================================
# 1. HTTP -> HTTPS REDIRECT
# =============================================
server {
    listen 80;
    listen [::]:80;
    server_name mindschool.site www.mindschool.site;

    # Certbot challenge must stay public on HTTP.
    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================
# 2. HTTPS - FRONTEND + BACKEND + DASHBOARD
# =============================================
upstream frontend_app {
    server 127.0.0.1:18080;
}

upstream backend_app {
    server 127.0.0.1:18000;
}

upstream dashboard_app {
    server 127.0.0.1:18501;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mindschool.site www.mindschool.site;

    client_max_body_size 100M;

    # SSL Certbot
    ssl_certificate /etc/letsencrypt/live/mindschool.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindschool.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Certbot renew
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Backend API
    location /api/ {
        client_max_body_size 100M;
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location ~ ^/(health|ready|docs|openapi\.json|redoc)(/.*)?$ {
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Streamlit Dashboard
    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        proxy_pass http://dashboard_app/dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # React Frontend
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
