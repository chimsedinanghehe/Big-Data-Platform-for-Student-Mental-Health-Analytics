server {
    listen 80;
    listen [::]:80;
    server_name mindschool.site www.mindschool.site;

    root /var/www/mindschool-user/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/mindschool-user/html;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
