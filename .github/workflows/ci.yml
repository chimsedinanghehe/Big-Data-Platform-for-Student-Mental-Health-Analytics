name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python syntax
        run: |
          python -m compileall -q backend MentalSchool_Dashboard scripts

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Validate production Compose
        run: |
          cp deploy/.env.production.example deploy/.env.production
          mkdir -p deploy/secrets
          printf '{}' > deploy/secrets/gcp-service-account.json
          docker compose --env-file deploy/.env.production -f deploy/docker-compose.production.yml config --quiet
